services:
  openclaw:
    build:
      context: .
    volumes:
      # Mount code directory
      - ${HOME}/code:/home/node/code
      # Mount container home directory (includes .openclaw/ config inside)
      - ${HOME}/.openclaw/sandboxed-home:/home/node
      # Mount git config for commits
      - ${HOME}/.gitconfig:/home/node/.gitconfig:ro
    ports:
      - "18789:18789"
    restart: unless-stopped
